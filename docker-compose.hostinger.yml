services:
  mongo:
    image: mongo:7
    container_name: gen_cl_dental_mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gen_cl_dental_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/gen_cl_dental
      JWT_SECRET: JWT_SECRET=8d7f4a6e9c2b1d3f5e8a7c4b9f0d2e6a1c3f7b9e4d6a8c2f5b7e9d1a4c6f8b3
      CORS_ORIGIN: ${CORS_ORIGIN:-https://gencl.mapims.edu.in}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5011:5000"
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gen_cl_dental_frontend
    ports:
      - "8088:80"
    depends_on:
      - backend
    restart: unless-stopped
volumes:
  mongo_data: