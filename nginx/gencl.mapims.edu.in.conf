# Nginx server block for Gen_CL (gencl.mapims.edu.in)
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled, or include in http block.
# Frontend: Docker port 8088 | Backend API: Docker port 5011

server {
    listen 80;
    server_name gencl.mapims.edu.in;

    # Frontend (SPA)
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5011/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}

