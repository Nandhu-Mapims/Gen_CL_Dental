# Production override for General Operations Checklist
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# 1. Copy .env.production.example to .env.production and set values.
# 2. Ensure .env.production is not committed (it is in .gitignore).

services:
  mongo:
    ports: []   # Do not expose MongoDB to host in production
    env_file:
      - .env.production
    restart: always

  backend:
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 5000
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    ports:
      - "${HTTP_PORT:-80}:80"
    restart: always
