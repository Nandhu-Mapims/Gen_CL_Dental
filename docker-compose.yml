# Gen_CL_Dental - APDCH Dental General Checklist
# Usage: docker compose up --build
#
# PORTS (must differ from gen_cl which uses 5011/8088):
#   backend:  5012:5000
#   frontend: 8089:80
#   mongo:    internal only (mongodb://mongo:27017/gen_cl_dental)

services:
  mongo:
    image: mongo:7
    container_name: gen_cl_dental_mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gen_cl_dental_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/gen_cl_dental
      JWT_SECRET: ${JWT_SECRET:-general-checklist-jwt-secret-min-32-characters-long-for-docker}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://gencl.mapims.edu.in}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5012:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gen_cl_dental_frontend
    ports:
      - "8089:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data: